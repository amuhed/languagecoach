<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Coach</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafaf9;
  --surface: #ffffff;
  --text: #1c1917;
  --text-muted: #78716c;
  --border: #e7e5e4;
  --accent: #292524;
  --accent-hover: #44403c;
  --red: #dc2626;
  --red-hover: #b91c1c;
  --green: #16a34a;
  --radius: 12px;
  --max-width: 640px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* Utility */
.hidden { display: none !important; }

/* API Key Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal h2 { font-size: 18px; margin-bottom: 8px; }
.modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
.modal input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
  font-family: monospace;
}
.modal input:focus { outline: none; border-color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #d6d3d1; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: var(--red-hover); }
.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  padding: 8px 14px;
  font-size: 13px;
}
.btn-ghost:hover { color: var(--text); background: var(--border); }

/* Welcome Screen */
.welcome {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.welcome-card {
  max-width: 420px;
  width: 100%;
  text-align: center;
}
.welcome-card h1 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 4px;
}
.welcome-card .subtitle {
  color: var(--text-muted);
  font-size: 15px;
  margin-bottom: 28px;
}
.welcome-card .returning-msg {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  text-align: left;
}
.step-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-align: left;
}
.language-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 24px;
}
.lang-btn {
  padding: 14px 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 15px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-family: inherit;
}
.lang-btn:hover { border-color: var(--accent); }
.lang-btn.selected { border-color: var(--accent); background: #f5f5f4; }

.level-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 28px;
}
.level-btn {
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-family: inherit;
}
.level-btn:hover { border-color: var(--accent); }
.level-btn.selected { border-color: var(--accent); background: #f5f5f4; }
.level-btn strong { margin-right: 6px; }

#startBtn { width: 100%; padding: 14px; font-size: 16px; }

/* Chat Screen */
.chat-screen {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: var(--max-width);
  width: 100%;
  margin: 0 auto;
}
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.chat-header .lang-level {
  font-size: 13px;
  color: var(--text-muted);
}

.transcript {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.msg-user {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-system {
  align-self: center;
  background: #fef3c7;
  color: #92400e;
  font-size: 13px;
  border-radius: 8px;
  text-align: center;
  max-width: 90%;
}
.msg-summary {
  align-self: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  max-width: 95%;
  font-size: 14px;
  line-height: 1.6;
}
.typing-indicator {
  align-self: flex-start;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  font-size: 14px;
  color: var(--text-muted);
}
.typing-indicator span {
  animation: blink 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 60%, 100% { opacity: 0.2; }
  30% { opacity: 1; }
}

.chat-input {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input textarea {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  max-height: 120px;
  line-height: 1.4;
  overflow-y: auto;
}
.chat-input textarea:focus { outline: none; border-color: var(--accent); }
.chat-input textarea::placeholder { color: #a8a29e; }

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.93); }
.send-btn { background: var(--accent); color: #fff; }
.send-btn:hover { background: var(--accent-hover); }
.mic-btn { background: var(--border); color: var(--text); }
.mic-btn:hover { background: #d6d3d1; }
.mic-btn.recording { background: var(--red); color: #fff; animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
}

.chat-footer {
  padding: 8px 16px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  background: var(--surface);
}

/* Responsive */
@media (max-width: 480px) {
  .welcome-card h1 { font-size: 24px; }
  .language-grid { grid-template-columns: 1fr 1fr; }
  .msg { max-width: 90%; }
}
</style>
</head>
<body>

<!-- API Key Modal -->
<div id="apiKeyModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Enter your Claude API key</h2>
    <p>Your key is stored only in your browser. It is never sent anywhere except the Claude API.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    <button class="btn btn-primary" id="saveApiKey" style="width:100%">Save &amp; continue</button>
  </div>
</div>

<!-- Welcome Screen -->
<div id="welcomeScreen" class="welcome">
  <div class="welcome-card">
    <h1>Language Coach</h1>
    <p class="subtitle">Practice conversation with an intelligent partner</p>
    <div id="returningMsg" class="returning-msg hidden"></div>

    <p class="step-label">Choose your language</p>
    <div class="language-grid">
      <button class="lang-btn" data-lang="french">&#x1F1EB;&#x1F1F7; French</button>
      <button class="lang-btn" data-lang="italian">&#x1F1EE;&#x1F1F9; Italian</button>
      <button class="lang-btn" data-lang="spanish">&#x1F1EA;&#x1F1F8; Spanish</button>
      <button class="lang-btn" data-lang="portuguese">&#x1F1E7;&#x1F1F7; Portuguese</button>
    </div>

    <p class="step-label">Choose your level</p>
    <div class="level-list">
      <button class="level-btn" data-level="A1"><strong>A1</strong> Complete beginner</button>
      <button class="level-btn" data-level="A2"><strong>A2</strong> Know some basics</button>
      <button class="level-btn" data-level="B1"><strong>B1</strong> Can hold simple conversations</button>
      <button class="level-btn" data-level="B2"><strong>B2</strong> Comfortable but making errors</button>
      <button class="level-btn" data-level="C1"><strong>C1</strong> Fluent, want to refine</button>
    </div>

    <button class="btn btn-primary" id="startBtn" disabled>Start conversation</button>
  </div>
</div>

<!-- Chat Screen -->
<div id="chatScreen" class="chat-screen hidden">
  <div class="chat-header">
    <span class="lang-level" id="chatLangLevel"></span>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost btn" id="suggestTopicBtn">Suggest topics</button>
      <button class="btn btn-danger" id="endSessionBtn" style="padding:8px 14px;font-size:13px">End session</button>
    </div>
  </div>
  <div class="transcript" id="transcript"></div>
  <div id="typingIndicator" class="typing-indicator hidden" style="margin:0 16px 8px">
    <span>.</span><span>.</span><span>.</span>
  </div>
  <div class="chat-input">
    <button class="icon-btn mic-btn" id="micBtn" title="Hold to speak">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <textarea id="chatInput" rows="1" placeholder="Type your message..."></textarea>
    <button class="icon-btn send-btn" id="sendBtn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="chat-footer" id="chatFooter"></div>
</div>

<script>
// ===================== State =====================
let state = {
  apiKey: null,
  language: null,
  level: null,
  profile: null,
  messages: [],       // Claude conversation messages
  sessionStart: null,
  sessionEnded: false
};

// ===================== DOM refs =====================
const $ = (sel) => document.querySelector(sel);
const apiKeyModal = $('#apiKeyModal');
const apiKeyInput = $('#apiKeyInput');
const saveApiKeyBtn = $('#saveApiKey');
const welcomeScreen = $('#welcomeScreen');
const returningMsg = $('#returningMsg');
const startBtn = $('#startBtn');
const chatScreen = $('#chatScreen');
const chatLangLevel = $('#chatLangLevel');
const transcript = $('#transcript');
const typingIndicator = $('#typingIndicator');
const chatInput = $('#chatInput');
const sendBtn = $('#sendBtn');
const micBtn = $('#micBtn');
const suggestTopicBtn = $('#suggestTopicBtn');
const endSessionBtn = $('#endSessionBtn');
const chatFooter = $('#chatFooter');

// ===================== Init =====================
function init() {
  state.apiKey = localStorage.getItem('languageCoach_apiKey');
  if (!state.apiKey) {
    apiKeyModal.classList.remove('hidden');
  }
  checkReturningUser();
  bindEvents();
}

function checkReturningUser() {
  const languages = ['french', 'italian', 'spanish', 'portuguese'];
  let found = null;
  let latest = null;
  for (const lang of languages) {
    const raw = localStorage.getItem(`languageCoach_${lang}_profile`);
    if (raw) {
      try {
        const p = JSON.parse(raw);
        if (!latest || (p.lastSessionDate && p.lastSessionDate > latest)) {
          latest = p.lastSessionDate;
          found = p;
        }
      } catch(e) {}
    }
  }
  if (found) {
    returningMsg.textContent = `Last time you practiced ${capitalize(found.language)} at ${found.level} level. Welcome back.`;
    returningMsg.classList.remove('hidden');
    // Pre-select
    selectLanguage(found.language);
    selectLevel(found.level);
  }
}

// ===================== Events =====================
function bindEvents() {
  saveApiKeyBtn.addEventListener('click', () => {
    const key = apiKeyInput.value.trim();
    if (!key) return;
    localStorage.setItem('languageCoach_apiKey', key);
    state.apiKey = key;
    apiKeyModal.classList.add('hidden');
  });
  apiKeyInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveApiKeyBtn.click();
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => selectLanguage(btn.dataset.lang));
  });
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => selectLevel(btn.dataset.level));
  });

  startBtn.addEventListener('click', startSession);
  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  chatInput.addEventListener('input', autoResize);
  micBtn.addEventListener('click', toggleMic);
  suggestTopicBtn.addEventListener('click', requestTopicSuggestions);
  endSessionBtn.addEventListener('click', endSession);
}

function selectLanguage(lang) {
  state.language = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('selected', b.dataset.lang === lang));
  updateStartBtn();
}

function selectLevel(level) {
  state.level = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('selected', b.dataset.level === level));
  updateStartBtn();
}

function updateStartBtn() {
  startBtn.disabled = !(state.language && state.level);
}

function autoResize() {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
}

// ===================== Session =====================
function startSession() {
  if (!state.apiKey) {
    apiKeyModal.classList.remove('hidden');
    return;
  }
  state.profile = loadProfile(state.language);
  state.messages = [];
  state.sessionStart = Date.now();
  state.sessionEnded = false;

  // Update UI
  welcomeScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  chatLangLevel.textContent = `${langEmoji(state.language)} ${capitalize(state.language)} · ${state.level}`;
  updateFooterStats();
  transcript.innerHTML = '';

  // Send opening message from Claude
  const systemPrompt = buildSystemPrompt();
  const openingInstruction = {
    role: 'user',
    content: `[System: The user has just started a new conversation session. Greet them warmly in ${capitalize(state.language)} and suggest a topic or ask what they'd like to talk about. Keep it natural and brief — 2-3 sentences maximum. Remember to calibrate to their ${state.level} level.]`
  };
  state.messages.push(openingInstruction);
  callClaude(systemPrompt);
}

function loadProfile(language) {
  const raw = localStorage.getItem(`languageCoach_${language}_profile`);
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  return {
    language,
    level: state.level,
    totalSessions: 0,
    totalMinutes: 0,
    lastSessionDate: null,
    lastSessionSummary: null,
    topicsDiscussed: [],
    recurringErrors: []
  };
}

function saveProfile() {
  if (!state.profile) return;
  localStorage.setItem(`languageCoach_${state.language}_profile`, JSON.stringify(state.profile));
}

function updateFooterStats() {
  if (!state.profile) return;
  const s = state.profile.totalSessions;
  const m = state.profile.totalMinutes;
  chatFooter.textContent = `Session ${s + 1} · ${m} minutes practiced`;
}

// ===================== System Prompt =====================
function buildSystemPrompt() {
  const lang = capitalize(state.language);
  const level = state.level;
  const p = state.profile;

  let contextBlock = '';
  if (p.lastSessionSummary) {
    contextBlock += `\nCONTEXT FROM PREVIOUS SESSIONS:\nLast session summary: ${p.lastSessionSummary}\n`;
  }
  if (p.recurringErrors && p.recurringErrors.length > 0) {
    contextBlock += `Known recurring errors to watch for: ${p.recurringErrors.join(', ')}\n`;
  }
  if (contextBlock) {
    contextBlock += `Pick up naturally from where they left off if relevant. You might reference a previous topic if it fits naturally, but don't force it.\n`;
  }

  const publicationMap = {
    french: 'Le Monde',
    italian: 'La Repubblica',
    spanish: 'El País',
    portuguese: 'Folha de São Paulo'
  };
  const publication = publicationMap[state.language];

  const topicSuggestionsMap = {
    french: `"On pourrait parler de... l'économie européenne, le tennis féminin, ou les dernières avancées en médecine. Qu'est-ce qui t'intéresse ?"`,
    italian: `"Potremmo parlare di... la politica italiana, lo sport femminile, o i progressi della medicina. Cosa preferisci ?"`,
    spanish: `"Podríamos hablar de... la economía, el deporte femenino, o los avances médicos. ¿Qué te parece ?"`,
    portuguese: `"Poderíamos falar de... a economia, o esporte feminino, ou os avanços da medicina. O que você prefere ?"`
  };

  const changeTopicMap = {
    french: `"On peut changer de sujet si tu veux..."`,
    italian: `"Possiamo cambiare argomento quando vuoi..."`,
    spanish: `"Podemos cambiar de tema cuando quieras..."`,
    portuguese: `"Podemos mudar de assunto quando quiser..."`
  };

  return `You are a warm, intellectually curious conversation partner helping the user practice ${lang} at ${level} level. Your goal is to have genuinely interesting, natural conversations that feel nothing like a traditional language app.
${contextBlock}
LANGUAGE AND LEVEL BEHAVIOR
Conduct the entire conversation in ${lang}. If the user says something in English — a single word or a full sentence — respond naturally in ${lang} as if you understood perfectly. Never comment on their use of English. Never switch to English yourself except in the end-of-session note.

Calibrate your language precisely to ${level}:
A1: Very short sentences, high-frequency vocabulary, lots of repetition, slow natural pace. Use cognates where possible. Topics should be simple and concrete but still connected to real life and current events — a sports result, a weather story, a local celebration. Never talk down to the user — simplify language not ideas.
A2: Slightly longer sentences, introduce common phrases, begin discussing simple news stories in accessible language. Still concrete but beginning to express simple opinions.
B1: Full sentences, varied vocabulary, simple current affairs, discussing preferences and experiences. Introduce more abstract topics gently.
B2: Rich vocabulary, complex sentence structures, full range of topics including markets, geopolitics, medicine, women's sports. Expect and encourage nuanced opinions.
C1: Native-like register, idiomatic expressions, sophisticated topics, push the user on precision and nuance. Reference specific journalists, publications, or cultural figures from the ${lang}-speaking world.

At all levels treat the user as an intelligent adult. Never simplify ideas, only simplify language.

Pay close attention to the complexity and accuracy of the user's responses. If they are coasting, gradually increase richness and complexity. If they are struggling, simplify without making it obvious. Never tell the user you are adjusting.

TOPIC UNIVERSE
Draw on the following topics weighted toward the user's level:
All levels: current affairs (simplified for A1/A2), sports including women's sports, culture, food, travel, daily life, human interest stories, medical and scientific advances presented accessibly.
B1 and above: markets and economics, geopolitics, EU and international politics, detailed medical and scientific advances, gender and society, climate and environment, technology and AI.
For ${lang}: draw on topics and perspectives as covered by ${publication}.

Have genuine opinions. Engage with ideas. Ask follow-up questions that require more than yes or no answers. React naturally to what the user shares.

FOLLOWING THE USER'S LEAD
Follow the user's conversational cues entirely. If they shift topic, shift with them immediately. Never redirect them back to a previous topic unless they ask.

If the user runs out of ideas or goes quiet, offer a natural menu of 3 suggestions in ${lang}, for example:
${topicSuggestionsMap[state.language]}

If the user wants to change topic and seems unsure how to express it, weave the phrase naturally into your response:
${changeTopicMap[state.language]}

CORRECTIONS
Correct every grammatical error subtly within your response. Restate the correct version naturally in your reply without drawing attention to it. Keep the conversation flowing — it should never feel like a lesson. Prioritize errors that affect meaning or recur repeatedly.

If a vocabulary gap comes up, weave the correct word naturally into your next sentence so they hear it in context.

END OF SESSION
When the user signals they want to end — "that's enough", "let's stop", "fin", "fine", "basta", "fin de session", "that's it" or similar — switch to English and give a brief friendly note covering:
1-2 recurring grammar patterns worth their attention with a simple example
1-2 vocabulary gaps that came up with the word in ${lang} and English
One thing they did well
A suggested topic for next time

Keep this to 5-6 sentences. Warm not clinical. Like a friend's observation not a report card.

After the summary, output a structured JSON block in this exact format so the app can parse and save it to localStorage:
\`\`\`json
{
  "sessionSummary": "one sentence summary of topics and key observations",
  "recurringErrors": ["error1", "error2"],
  "topicsDiscussed": ["topic1", "topic2"],
  "vocabHighlights": ["word1", "word2"]
}
\`\`\`

IMPORTANT: Only output this JSON block when ending the session, not during normal conversation.`;
}

// ===================== Claude API =====================
async function callClaude(systemPrompt) {
  typingIndicator.classList.remove('hidden');
  scrollToBottom();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: systemPrompt,
        messages: state.messages.map(m => ({ role: m.role, content: m.content }))
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      if (response.status === 401) {
        localStorage.removeItem('languageCoach_apiKey');
        state.apiKey = null;
        addMessage('system', 'Invalid API key. Please re-enter your key.');
        apiKeyModal.classList.remove('hidden');
      } else {
        addMessage('system', `API error: ${err.error?.message || response.statusText}`);
      }
      typingIndicator.classList.add('hidden');
      return;
    }

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    state.messages.push({ role: 'assistant', content: text });
    typingIndicator.classList.add('hidden');

    // Check if this is an end-of-session response
    const jsonMatch = text.match(/```json\s*(\{[\s\S]*?\})\s*```/);
    if (jsonMatch) {
      const displayText = text.replace(/```json\s*\{[\s\S]*?\}\s*```/, '').trim();
      addMessage('summary', displayText);
      try {
        const sessionData = JSON.parse(jsonMatch[1]);
        finalizeSession(sessionData);
      } catch(e) {
        finalizeSession(null);
      }
    } else {
      addMessage('assistant', text);
      speak(text);
    }
  } catch(e) {
    typingIndicator.classList.add('hidden');
    addMessage('system', `Connection error: ${e.message}`);
  }
}

// ===================== Messages =====================
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  transcript.appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    transcript.scrollTop = transcript.scrollHeight;
  });
}

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || state.sessionEnded) return;

  addMessage('user', text);
  state.messages.push({ role: 'user', content: text });
  chatInput.value = '';
  chatInput.style.height = 'auto';

  callClaude(buildSystemPrompt());
}

// ===================== Topic Suggestions =====================
function requestTopicSuggestions() {
  if (state.sessionEnded) return;
  const msg = `[The user has pressed the "suggest topics" button. Offer 3 interesting topic suggestions in ${capitalize(state.language)}, naturally and briefly.]`;
  state.messages.push({ role: 'user', content: msg });
  callClaude(buildSystemPrompt());
}

// ===================== End Session =====================
function endSession() {
  if (state.sessionEnded) return;
  const msg = "That's it for today, let's end the session.";
  addMessage('user', msg);
  state.messages.push({ role: 'user', content: msg });
  state.sessionEnded = true;
  callClaude(buildSystemPrompt());
}

function finalizeSession(sessionData) {
  const minutes = Math.round((Date.now() - state.sessionStart) / 60000);
  const p = state.profile;
  p.level = state.level;
  p.totalSessions += 1;
  p.totalMinutes += minutes;
  p.lastSessionDate = new Date().toISOString().split('T')[0];

  if (sessionData) {
    if (sessionData.sessionSummary) p.lastSessionSummary = sessionData.sessionSummary;
    if (sessionData.recurringErrors) {
      const merged = [...new Set([...sessionData.recurringErrors, ...(p.recurringErrors || [])])];
      p.recurringErrors = merged.slice(0, 5);
    }
    if (sessionData.topicsDiscussed) {
      const merged = [...new Set([...sessionData.topicsDiscussed, ...(p.topicsDiscussed || [])])];
      p.topicsDiscussed = merged.slice(0, 10);
    }
  }

  saveProfile();
  updateFooterStats();

  // Show return button
  const returnDiv = document.createElement('div');
  returnDiv.style.cssText = 'text-align:center;margin-top:16px;';
  const returnBtn = document.createElement('button');
  returnBtn.className = 'btn btn-primary';
  returnBtn.textContent = 'Start new session';
  returnBtn.addEventListener('click', () => {
    chatScreen.classList.add('hidden');
    welcomeScreen.classList.remove('hidden');
    checkReturningUser();
  });
  returnDiv.appendChild(returnBtn);
  transcript.appendChild(returnDiv);
  scrollToBottom();
}

// ===================== Speech Recognition =====================
let recognition = null;
let isRecording = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addMessage('system', 'Speech recognition is not supported in this browser. Please use Chrome.');
    return;
  }

  if (isRecording) {
    stopRecording();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;

  const langMap = {
    french: 'fr-FR',
    italian: 'it-IT',
    spanish: 'es-ES',
    portuguese: 'pt-BR'
  };
  recognition.lang = langMap[state.language] || 'fr-FR';

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    chatInput.value = text;
    autoResize();
    sendMessage();
  };

  recognition.onerror = (event) => {
    if (event.error !== 'no-speech') {
      addMessage('system', `Mic error: ${event.error}`);
    }
    stopRecording();
  };

  recognition.onend = () => {
    stopRecording();
  };

  recognition.start();
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// ===================== Speech Synthesis =====================

// Preferred female voices per language on macOS (premium/enhanced voices)
const preferredVoices = {
  french: ['Amelie', 'Audrey', 'Aurelie', 'Marie'],
  italian: ['Alice', 'Federica', 'Paola'],
  spanish: ['Paulina', 'Monica', 'Marisol', 'Jimena'],
  portuguese: ['Luciana', 'Fernanda', 'Raquel']
};

function pickBestVoice(voices, language, targetLang) {
  const preferred = preferredVoices[language] || [];
  const langCode = targetLang.split('-')[0];

  // Filter to voices that match the language
  const matching = voices.filter(v => v.lang === targetLang || v.lang.startsWith(langCode));
  if (matching.length === 0) return null;

  // 1. Try preferred female voice names (premium macOS voices)
  for (const name of preferred) {
    const v = matching.find(v => v.name.includes(name));
    if (v) return v;
  }

  // 2. Try any voice with "Premium" or "Enhanced" in the name
  const premium = matching.find(v => /premium|enhanced/i.test(v.name));
  if (premium) return premium;

  // 3. Try any female-sounding voice (heuristic: common female name patterns)
  const femaleHint = matching.find(v => /female|woman|féminin/i.test(v.name));
  if (femaleHint) return femaleHint;

  // 4. Fall back to first matching voice
  return matching[0];
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;

  // Cancel any ongoing speech
  speechSynthesis.cancel();

  const langMap = {
    french: 'fr-FR',
    italian: 'it-IT',
    spanish: 'es-ES',
    portuguese: 'pt-BR'
  };

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = langMap[state.language] || 'fr-FR';
  utterance.rate = state.level === 'A1' ? 0.8 : state.level === 'A2' ? 0.85 : 0.92;

  const voices = speechSynthesis.getVoices();
  const voice = pickBestVoice(voices, state.language, langMap[state.language]);
  if (voice) utterance.voice = voice;

  speechSynthesis.speak(utterance);
}

// Ensure voices are loaded
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {};
  speechSynthesis.getVoices();
}

// ===================== Helpers =====================
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function langEmoji(lang) {
  const map = { french: '\u{1F1EB}\u{1F1F7}', italian: '\u{1F1EE}\u{1F1F9}', spanish: '\u{1F1EA}\u{1F1F8}', portuguese: '\u{1F1E7}\u{1F1F7}' };
  return map[lang] || '';
}
